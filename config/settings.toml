# Fact Fusion Automation Configuration

[app]
name = "Fact Fusion Automation"
version = "1.0.0"
debug = false

# Video Source - FREE Stock Providers (NO LOCAL FOOTAGE NEEDED!)
video_source = "pexels"  # pexels, pixabay, coverr, mixkit
fallback_sources = ["pixabay", "coverr", "mixkit"]

# Pexels API (FREE - unlimited for video generation)
# Get key: https://www.pexels.com/api/
pexels_api_keys = ["your_pexels_api_key_here"]

# Pixabay API (FREE - fallback)
# Get key: https://pixabay.com/api/docs/
pixabay_api_keys = []

# Coverr API (FREE - fallback)
# Get key: https://coverr.co/api
coverr_api_keys = []

# Mixkit API (FREE - fallback)
# Get key: https://mixkit.co/api/
mixkit_api_keys = []

# LLM Configuration
llm_provider = "gemini"  # gemini or openai

# Gemini API (FREE tier available)
gemini_api_key = ""
gemini_model = "gemini-1.5-flash"

# OpenAI (optional, if not using Gemini)
openai_api_key = ""
openai_base_url = ""
openai_model = "gpt-4o-mini"

# Text-to-Speech Settings
[tts]
provider = "piper"  # piper (FREE) or edge_tts (Azure)
voice = "en-US-GuyNeural"
rate = 1.0
volume = 1.0

# Piper TTS Settings (FREE, offline)
piper_voice = "en_US-lessac-medium"
piper_language = "en"

# Video Settings
[video]
orientation = "9:16"  # 9:16 (Shorts), 16:9 (Long), 1:1 (Square)
resolution = "1080x1920"
fps = 30
bitrate = 5000
video_codec = "h264"

# Subtitle Settings
[subtitle]
enabled = true
font_size = 60
font_color = "#FFFFFF"
stroke_color = "#000000"
stroke_width = 2
position = "bottom"

# Background Music Settings
[music]
enabled = true
volume = 0.1
music_path = "~/Projects/fact-fusion-automation/storage/bgm"

# YouTube Upload Settings
[youtube]
enabled = true
oauth_client_secret = "~/.config/google/client_secret.json"
oauth_token = "~/.config/google/youtube_token.pickle"

# Auto-optimize titles, tags, description
auto_optimize = true

# Auto-schedule posts
auto_schedule = true

# Default privacy status
privacy_status = "public"  # public, private, unlisted

# Google Trends Settings (from Viral-Faceless)
[trends]
enabled = true
country = "US"
category = "all"
refresh_interval = 3600  # seconds

# Batch Generation Settings
[batch]
max_videos = 100
parallel_jobs = 4
retry_failed = true
max_retries = 3

# Storage Paths
[storage]
footage_path = "~/Projects/fact-fusion-automation/storage/footage"
output_path = "~/Projects/fact-fusion-automation/storage/output"
bgm_path = "~/Projects/fact-fusion-automation/storage/bgm"
cache_path = "~/Projects/fact-fusion-automation/storage/cache"

# Logging
[logging]
level = "INFO"
file = "~/Projects/fact-fusion-automation/logs/app.log"
max_size_mb = 100
backup_count = 5